# ==============================================================================
# BEHAVIOR & TIMING
# ==============================================================================
# Controls the fundamental interactions and timing rules of the void.
# ==============================================================================
behavior:
  # -> How long the user stares at the blank void before the first text appears.
  initial_delay_ms: 3000
  
  # -> Minimum time (in milliseconds) a sentence must be on screen before it can be skipped.
  # This prevents accidental double-clicks from skipping text you haven't seen.
  cooldown_ms: 300


# ==============================================================================
# VISUALS CONFIGURATION
# ==============================================================================
# This section completely drives the look and feel of the website.
# When the app loads, `main.js` reads these values and injects them as CSS 
# Custom Properties (variables) into the document root. `style.css` then uses 
# these variables to render the styles and animations.
# Changing these values will update the site instantly.
# ==============================================================================
visuals:
  # -> Injects into --bg-color in style.css. Sets the main page background.
  background_color: "#030303"
  
  # -> Injects into --text-color in style.css. Sets the primary font color.
  text_color: "#e5e5e5"
  
  # -> Injects into --font-family in style.css. Sets the typography for the page.
  font_family: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
  
  # -> Injects into --font-size in style.css. Controls how large the sentence appears.
  font_size: "2.5rem"
  
  # -> Injects into --font-weight in style.css. Controls text thickness.
  font_weight: 200
  
  # ----------------------------------------------------------------------------
  # TRANSITIONS & ANIMATIONS
  # ----------------------------------------------------------------------------
  
  # -> Injects into --blur-amount in style.css.
  # How blurry the text is when it is hidden in "the void" before appearing.
  blur_amount: "12px"
  
  # -> Injects into --zoom-amount in style.css.
  # The initial scale of the text before it appears (0.9 means it slowly zooms in to 1.0).
  zoom_amount: 0.9
  
  # -> Injects into --exit-blur-amount in style.css.
  # How blurry the text gets as it fades out when transitioning to the next sentence.
  exit_blur_amount: "6px"
  
  # -> Injects into --exit-zoom-amount in style.css.
  # The scale of the text as it exits (1.05 means it drifts forward as it fades out).
  exit_zoom_amount: 1.05
  
  # -> Injects into --enter-duration in style.css AND parsed by main.js.
  # The time it takes for a sentence to slowly fade in, unblur, and scale up.
  enter_duration: "2s"
  
  # -> Injects into --enter-easing in style.css.
  # Controls the acceleration curve of the entrance (e.g. 'ease', 'ease-out', or 'cubic-bezier').
  enter_easing: "cubic-bezier(0.25, 1, 0.5, 1)"
  
  # -> Injects into --exit-duration in style.css AND parsed by main.js.
  # The time it takes for a sentence to fade out and blur away before the next one starts.
  exit_duration: "1.5s"

  # -> Injects into --exit-easing in style.css.
  # Using 'ease-out' here instead of an 'ease-in' so the blur and fade start reacting instantly to your click.
  exit_easing: "ease-out"


# ==============================================================================
# CONTENT SCRIPT
# ==============================================================================
# Sentences are NO LONGER stored here. They now live as individual YAML files
# inside `src/sentences/` (one sentence per file, e.g. sentences0000.yaml).
#
# This keeps the main config small and lets the sentence set scale to hundreds
# or thousands of entries without bloating this file or the initial download.
# At runtime the browser discovers the available files (by name only) and
# fetches just the single, randomly-selected sentence it needs. See `main.js`.
# ==============================================================================
