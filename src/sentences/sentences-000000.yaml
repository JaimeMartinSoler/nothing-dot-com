# ==============================================================================
# SENTENCES LIST 000000
# ==============================================================================
# A list of sentences shown to the user. One list (file) is picked at random
# per page load. See `src/main.js` for the selection + lazy-loading logic.
# Each entry supports multiple languages (currently en/es).
# ==============================================================================

- en: "Are you still here?\n(double tap/click to change language)"
  es: "¿Sigues aquí?\n(toca/haz click dos veces para cambiar de idioma)"

- en: "Are you dumb?"
  es: "¿Eres tonto?"

- en: "Did you check the name of the website?"
  es: "¿Te has fijado en el nombre de la web?"

- en: "This is nothing..."
  es: "Esto es la nada..."

- en: "There is no content here"
  es: "Aquí no hay contenido"

- en: "Seriously, what are you waiting for?"
  es: "En serio, ¿qué estás esperando?"

- en: "A reward?"
  es: "¿Una recompensa?"

- en: "There are no rewards in nothingness"
  es: "No hay recompensas en la nada"

- en: "Just close the tab"
  es: "Simplemente cierra la pestaña"

- en: "Or keep clicking. It's your time"
  es: "O sigue haciendo clic. Es tu tiempo"
