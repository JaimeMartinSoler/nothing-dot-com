- en: "Welcome to nothing.\n\n(double tap/click to change language anytime)"
  es: "Bienvenido a la nada.\n\n(doble toque/click para cambiar de idioma cuando quieras)"

- en: "No notifications. No feed. No dopamine"
  es: "Sin notificaciones. Sin feed. Sin dopamina"

- en: "Just you and an empty screen"
  es: "Solo tú y una pantalla vacía"

- en: "Uncomfortable, isn't it?"
  es: "Incómodo, ¿a que sí?"

- en: "Your thumb still wants to scroll"
  es: "Tu pulgar todavía quiere hacer scroll"

- en: "There is nothing to scroll"
  es: "No hay nada que deslizar"

- en: "Boredom is allowed here"
  es: "Aquí está permitido aburrirse"

- en: "Try sitting with it"
  es: "Intenta quedarte con ello"

- en: "Or don't. I'm just text"
  es: "O no. Solo soy texto"

- en: "The nothing thanks you for your visit"
  es: "La nada te agradece tu visita"
