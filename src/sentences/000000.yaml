- en: "Are you still here?\n\n(double tap/click to change language anytime)"
  es: "¿Sigues aquí?\n\n(doble toque/click para cambiar de idioma cuando quieras)"

- en: "Are you dumb?"
  es: "¿Eres tonto?"

- en: "Did you check the name of the website?"
  es: "¿Te has fijado en el nombre de la web?"

- en: "This is nothing..."
  es: "Esto es la nada..."

- en: "There is no content here"
  es: "Aquí no hay contenido"

- en: "Seriously, what are you waiting for?"
  es: "En serio, ¿qué estás esperando?"

- en: "A reward?"
  es: "¿Una recompensa?"

- en: "There are no rewards in nothingness"
  es: "No hay recompensas en la nada"

- en: "Just close the tab"
  es: "Simplemente cierra la pestaña"

- en: "Or keep clicking. It's your time"
  es: "O sigue haciendo click. Es tu tiempo"
